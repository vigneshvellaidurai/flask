<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>அன்பே நாதிரா · விக்கி</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #f5f0e8;
      --cream:     #faf6ee;
      --card:      #ffffff;
      --border:    #d4c9a8;
      --gold:      #b8952a;
      --gold-dark: #8a6e1a;
      --gold-line: #c9a84c;
      --text:      #1a1410;
      --text2:     #3d3228;
      --muted:     #8c7b60;
      --num-bg:    #1a1410;
      --num-text:  #ffffff;
      --close:     #aaa;
      --close-h:   #1a1410;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif Tamil', serif;
      min-height: 100vh;
    }

    /* ── HERO / HEADER ── */
    .hero {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      text-align: center;
      padding: 70px 24px 52px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle texture lines */
    .hero::before {
      content:'';
      position:absolute; inset:0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 39px,
        rgba(180,150,80,0.07) 39px, rgba(180,150,80,0.07) 40px
      );
      pointer-events:none;
    }

    .hero-ornament {
      display:flex; align-items:center; justify-content:center;
      gap:18px; margin-bottom:28px;
    }
    .orn-line {
      height:1px; width:90px;
      background:linear-gradient(90deg,transparent,var(--gold-line));
    }
    .orn-line.r { background:linear-gradient(90deg,var(--gold-line),transparent); }
    .orn-diamond { color:var(--gold); font-size:16px; letter-spacing:6px; }

    .site-title {
      font-family:'Noto Serif Tamil',serif;
      font-size: clamp(48px,9vw,96px);
      font-weight: 700;
      color: var(--text);
      letter-spacing: 2px;
      line-height: 1.1;
    }

    .site-subtitle {
      margin-top:14px;
      font-family:'Cormorant Garamond',serif;
      font-style:italic; font-size:17px;
      color:var(--muted); letter-spacing:4px;
    }

    .hero-bottom-line {
      display:flex; align-items:center; justify-content:center;
      gap:18px; margin:28px 0 24px;
    }
    .hbl-line {
      height:1px; flex:1; max-width:180px;
      background:linear-gradient(90deg,transparent,var(--border));
    }
    .hbl-line.r { background:linear-gradient(90deg,var(--border),transparent); }
    .hbl-text {
      font-family:'Cormorant Garamond',serif;
      font-style:italic; font-size:15px;
      color:var(--muted); letter-spacing:3px;
    }

    .insta-link {
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 26px;
      border:1.5px solid var(--border);
      border-radius:50px;
      color:var(--text2); text-decoration:none; font-size:14px;
      background: rgba(255,255,255,0.6);
      transition:all 0.3s; letter-spacing:0.5px;
      font-family:'Cormorant Garamond',serif;
    }
    .insta-link:hover {
      background:var(--text); color:white; border-color:var(--text);
    }
    .insta-link svg { width:16px; height:16px; }

    /* ── ADD SECTION ── */
    .add-section {
      max-width:900px; margin:48px auto 0; padding:0 24px;
    }

    .add-box {
      background:white; border:1px solid var(--border);
      border-top:3px solid var(--gold);
      padding:32px; border-radius:2px;
      box-shadow:0 4px 24px rgba(0,0,0,0.06);
    }

    .add-label {
      font-family:'Cormorant Garamond',serif;
      font-size:11px; letter-spacing:4px;
      text-transform:uppercase; color:var(--gold-dark);
      margin-bottom:18px;
    }

    .add-row { display:flex; flex-direction:column; gap:14px; }

    .field-row { display:flex; gap:14px; }

    input[type="text"], textarea, input[type="date"] {
      background:#fafaf8; border:1px solid var(--border);
      padding:12px 16px; color:var(--text);
      font-family:'Noto Serif Tamil',serif; font-size:15px;
      width:100%; outline:none;
      transition:border-color 0.25s, box-shadow 0.25s;
      border-radius:1px;
    }
    input[type="text"]:focus, textarea:focus, input[type="date"]:focus {
      border-color:var(--gold); box-shadow:0 0 0 3px rgba(184,149,42,0.1);
      background:white;
    }
    input[type="text"]::placeholder, textarea::placeholder { color:#bbb; }
    textarea { min-height:130px; resize:vertical; }

    .date-field { flex:0 0 200px; }
    .title-field { flex:1; }

    .btn-add {
      align-self:flex-end;
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 32px;
      background:var(--num-bg); color:white;
      border:none; font-family:'Cormorant Garamond',serif;
      font-size:16px; letter-spacing:1px;
      cursor:pointer; transition:all 0.3s;
      border-radius:1px;
    }
    .btn-add:hover { background:var(--gold-dark); }
    .btn-add svg { width:16px; height:16px; }

    /* ── POEMS COUNT BAR ── */
    .count-bar {
      max-width:900px; margin:40px auto 0; padding:0 24px;
      display:flex; align-items:center; gap:16px;
    }
    .count-line { flex:1; height:1px; background:var(--border); }
    .count-text {
      font-family:'Cormorant Garamond',serif;
      font-size:13px; letter-spacing:3px; color:var(--muted);
      text-transform:uppercase; white-space:nowrap;
    }

    /* ── GRID ── */
    .grid {
      max-width:1160px; margin:32px auto 80px;
      padding:0 24px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:32px;
      align-items:start;
    }

    /* ── POEM CARD ── */
    .poem-card {
      background:white; border:1px solid var(--border);
      position:relative; overflow:visible;
      animation:fadeup 0.45s cubic-bezier(0.34,1.4,0.64,1) both;
      transition:box-shadow 0.3s, transform 0.3s;
      box-shadow:0 2px 16px rgba(0,0,0,0.06);
    }
    .poem-card:hover {
      box-shadow:0 8px 40px rgba(0,0,0,0.12);
      transform:translateY(-3px);
    }
    @keyframes fadeup {
      from{opacity:0;transform:translateY(28px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* top gold line */
    .poem-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg,var(--gold),var(--gold-line),transparent);
    }

    /* number badge */
    .card-num {
      position:absolute; top:-18px; left:16px;
      background:var(--num-bg); color:var(--num-text);
      font-family:'Cormorant Garamond',serif;
      font-size:13px; font-weight:600; letter-spacing:1px;
      padding:4px 14px; z-index:2;
    }

    /* close button */
    .card-close {
      position:absolute; top:12px; right:14px;
      background:none; border:none;
      color:var(--close); font-size:18px; line-height:1;
      cursor:pointer; transition:color 0.2s; padding:2px 6px;
      font-family:sans-serif;
    }
    .card-close:hover { color:var(--close-h); }

    .card-body { padding:28px 28px 24px; }

    .card-date {
      font-family:'Cormorant Garamond',serif;
      font-style:italic; font-size:14px;
      color:var(--gold); margin-bottom:18px;
      letter-spacing:0.5px;
    }

    .card-title {
      font-size:17px; font-weight:700; color:var(--text);
      margin-bottom:14px; line-height:1.4;
      font-family:'Noto Serif Tamil',serif;
    }

    .card-poem {
      font-size:15px; line-height:2;
      color:var(--text2); white-space:pre-wrap;
      font-family:'Noto Serif Tamil',serif;
    }

    .card-footer {
      margin-top:24px; padding-top:16px;
      border-top:1px solid #e8e0d0;
      text-align:right;
    }
    .card-sig {
      font-family:'Cormorant Garamond',serif;
      font-style:italic; font-size:16px;
      color:var(--muted); letter-spacing:1px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column:1/-1; text-align:center;
      padding:80px 20px; color:var(--muted);
    }
    .empty-sym { font-size:48px; display:block; margin-bottom:16px; }
    .empty p { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; }

    /* ── FOOTER ── */
    footer {
      border-top:1px solid var(--border); background:var(--cream);
      text-align:center; padding:28px 20px;
      color:var(--muted); font-size:13px;
      font-family:'Cormorant Garamond',serif; letter-spacing:1px;
    }
    footer a { color:var(--gold-dark); text-decoration:none; }
    footer a:hover { color:var(--text); }
    .footer-sig {
      display:block; margin-top:8px;
      font-style:italic; font-size:18px; color:var(--text2);
      letter-spacing:2px;
    }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--num-bg); color:white;
      font-family:'Cormorant Garamond',serif; font-size:15px;
      padding:12px 30px; border-radius:1px;
      z-index:1000; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      letter-spacing:1px; box-shadow:0 8px 30px rgba(0,0,0,0.2);
    }
    .toast.show { transform:translateX(-50%) translateY(0); }

    /* ── ADD BUTTON FAB ── */
    .fab {
      position:fixed; bottom:32px; right:32px;
      width:56px; height:56px; border-radius:50%;
      background:var(--num-bg); color:white;
      border:none; font-size:28px; line-height:1;
      cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,0.25);
      transition:all 0.3s; z-index:100;
      display:flex; align-items:center; justify-content:center;
    }
    .fab:hover { background:var(--gold-dark); transform:scale(1.1); }

    /* scroll to add */
    @media(max-width:768px) {
      .field-row { flex-direction:column; }
      .date-field { flex:auto; }
      .grid { grid-template-columns:1fr; }
    }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--gold); }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-ornament">
    <div class="orn-line"></div>
    <span class="orn-diamond">◆ ◆ ◆</span>
    <div class="orn-line r"></div>
  </div>
  <h1 class="site-title">அன்பே நாதிரா</h1>
  <p class="site-subtitle">Anbe Naathira · கவிதைத் தொகுப்பு</p>
  <div class="hero-bottom-line">
    <div class="hbl-line"></div>
    <span class="hbl-text">காதல் · இயற்கை · உணர்வு</span>
    <div class="hbl-line r"></div>
  </div>
  <a class="insta-link" href="https://www.instagram.com/vigneshvellaidurai/" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
    </svg>
    @vigneshvellaidurai
  </a>
</div>

<!-- ADD POEM -->
<div class="add-section" id="add-section">
  <div class="add-box">
    <p class="add-label">✦ புதிய கவிதை சேர்க்கவும்</p>
    <div class="add-row">
      <div class="field-row">
        <input class="title-field" type="text" id="poem-title" placeholder="கவிதையின் தலைப்பு (விரும்பினால்)..."/>
        <input class="date-field" type="date" id="poem-date"/>
      </div>
      <textarea id="poem-body" placeholder="உங்கள் கவிதையை இங்கே எழுதுங்கள்...&#10;(Ctrl+Enter to add)"></textarea>
      <button class="btn-add" onclick="addPoem()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        கவிதை சேர்க்கவும்
      </button>
    </div>
  </div>
</div>

<!-- COUNT BAR -->
<div class="count-bar">
  <div class="count-line"></div>
  <span class="count-text" id="poem-count">0 கவிதைகள்</span>
  <div class="count-line"></div>
</div>

<!-- GRID -->
<div class="grid" id="poems-grid"></div>

<!-- FOOTER -->
<footer>
  காதலின் வார்த்தைகள் · Words of Love &nbsp;◆&nbsp;
  <a href="https://www.instagram.com/vigneshvellaidurai/" target="_blank">@vigneshvellaidurai</a>
  <span class="footer-sig">— விக்கி</span>
</footer>

<!-- FAB -->
<button class="fab" onclick="document.getElementById('add-section').scrollIntoView({behavior:'smooth'})" title="கவிதை சேர்க்கவும்">+</button>

<div class="toast" id="toast"></div>

<script>
  // Tamil month names
  const tamilMonths = ['ஜன.','பிப்.','மார்.','ஏப்.','மே','ஜூன்','ஜூலை','ஆக.','செப்.','அக்.','நவ.','டிச.'];

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y,m,d] = dateStr.split('-');
    return `${parseInt(d)} ${tamilMonths[parseInt(m)-1]}, ${y}`;
  }

  function todayStr() {
    const n = new Date();
    const y = n.getFullYear();
    const m = String(n.getMonth()+1).padStart(2,'0');
    const d = String(n.getDate()).padStart(2,'0');
    return `${y}-${m}-${d}`;
  }

  // Set today as default date
  document.getElementById('poem-date').value = todayStr();

  const defaultPoems = [
    {id:1000001,title:'',date:'2024-02-10',body:`அவளுக்கு அவ்வளவு நீள கூந்தல் இல்லை.\nஆனால், அந்த அழகுக்கும் குறைவில்லை.\n\nஅந்த கார் வண்ண\nகூந்தலில் கலையிடுகிறது\nஒற்றை ரோஜா.`},
    {id:1000002,title:'',date:'2024-09-12',body:`கோடை காலத்திலும் குளம் வற்றவில்லை.\nஅந்த பெண் மீன் பிரிந்து போனதால்.\n\nதண்ணீர் வற்றியும்,\nஆண் மீனின் கண்ணீரில்\nவாழ்கிறது காதல்.`},
    {id:1000003,title:'',date:'2024-12-12',body:`உன்னை கண்டுபிடிக்க\nமுகமெல்லாம் தேவை இல்லை,\nஎன்னை கலங்கடித்த உன்\nகண்களே போதும்.`},
    {id:1000004,title:'"நான்"',date:'2024-01-01',body:`உனக்காக ஒரு கவிதை எழுத நினைத்து\nகவிதையின் தொடக்கத்தில்\nஉன் பெயரை எழுதினேன்\nஅங்கேயே கவிதை முடிந்து விட்டது!!\n\n~நான்`},
    {id:1000005,title:'நிலவின் முகம்',date:'2024-03-15',body:`நீங்கள் வானில்\nபார்ப்பதெல்லாம்\nநிலவின் முதுகைத்தான்.\n\nமுகத்தை பார்க்க\nவேண்டுமென்றால்\nசொல்லுங்கள்\nஅவளிடம் கேட்டுப் பார்க்கிறேன்.`},
    {id:1000006,title:'பெண்ணின் அழகு',date:'2024-04-20',body:`வாழை இலை வழிரும் அழகு\nஇருந்தும் இல்லை இடையும் அழகு\nமுன்னழகை மிஞ்சிவிடும்\nபெண்ணே உன் பின்னழகு\n\nமுக்தி வேண்டும் பக்தன் போல\nதிடமான அகம் அழகு\nஇறை நினைப்பை எனக்கு தரும்\nபெண்ணே உன் பேரழகு.`},
    {id:1000007,title:'மருத்துவர்',date:'2024-06-08',body:`மருத்துவர்\nமாத்திரையா\nஊசியா எனக் கேட்கிறார்\nநீ என\nஎப்படிச் சொல்வேன்!`},
    {id:1000008,title:'முத்தங்கள்',date:'2024-07-22',body:`எனக்குச் சில முத்தங்கள்\nகடனாய்க் கொடுங்கள்\nவட்டியும் முதலுமாய்\nதிருப்பித் தருகிறேன்\n\nஒருவேளை என்னால்\nகொடுக்க முடியவில்லையெனில்\nதண்டனையாக\nஎன்னைக் கட்டியணைத்துக் கொள்ளுங்கள்.`},
    {id:1000009,title:'உலகின் வயது',date:'2024-08-30',body:`உலகின் வயது\nஇரு நூறு கோடி ஆண்டுகளாம்\n\nஅது பொய்\n\nஉன்னை நான் பார்த்து\nஇரண்டு நிமிடங்கள் தானே ஆகின்றன.`}
  ];

  let poems = JSON.parse(localStorage.getItem('anbe-v4') || 'null');
  if (!poems) { poems = [...defaultPoems]; save(); }

  function save() { localStorage.setItem('anbe-v4', JSON.stringify(poems)); }

  function showToast(m) {
    const t = document.getElementById('toast');
    t.textContent = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function addPoem() {
    const title = document.getElementById('poem-title').value.trim();
    const body  = document.getElementById('poem-body').value.trim();
    const date  = document.getElementById('poem-date').value || todayStr();
    if (!body) { showToast('கவிதை எழுதுங்கள்!'); return; }
    poems.unshift({ id:Date.now(), title, date, body });
    save(); render();
    document.getElementById('poem-title').value = '';
    document.getElementById('poem-body').value  = '';
    document.getElementById('poem-date').value  = todayStr();
    showToast('✦ கவிதை சேர்க்கப்பட்டது!');
  }

  function removePoem(id) {
    poems = poems.filter(p => p.id !== id);
    save(); render();
    showToast('கவிதை நீக்கப்பட்டது');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function numLabel(n) {
    return String(n).padStart(2,'0');
  }

  function render() {
    const grid = document.getElementById('poems-grid');
    const cnt  = document.getElementById('poem-count');
    cnt.textContent = `${poems.length} கவிதைகள்`;

    if (!poems.length) {
      grid.innerHTML = `<div class="empty"><span class="empty-sym">◆</span><p>இன்னும் கவிதைகள் சேர்க்கப்படவில்லை...<br/>No poems yet — add your first poem above.</p></div>`;
      return;
    }

    grid.innerHTML = poems.map((p, i) => `
      <div class="poem-card">
        <div class="card-num">${numLabel(poems.length - i)}</div>
        <button class="card-close" onclick="removePoem(${p.id})" title="நீக்கவும்">×</button>
        <div class="card-body">
          ${p.date ? `<div class="card-date">${formatDate(p.date)}</div>` : ''}
          ${p.title ? `<div class="card-title">${esc(p.title)}</div>` : ''}
          <div class="card-poem">${esc(p.body)}</div>
          <div class="card-footer">
            <span class="card-sig">— விக்கி</span>
          </div>
        </div>
      </div>`).join('');
  }

  document.getElementById('poem-body').addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') addPoem();
  });

  render();
</script>
</body>
</html>
